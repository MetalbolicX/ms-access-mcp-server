{% extends "base.html" %}

{% block extra_head %}
<link rel="stylesheet" href="/dist/assets/styles.css">
<style>
    .card { background: var(--color-surface); padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 1rem; }
    .card h2 { color: var(--color-secondary); margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--color-border); }
    th { color: var(--color-text-muted); font-weight: 600; }
    .explorer-layout { display: grid; grid-template-columns: 280px 1fr; gap: 1rem; }
    .tables-panel { border: 1px solid var(--color-border); border-radius: 8px; padding: 1rem; }
    .tables-panel-title { font-weight: 600; margin-bottom: 0.5rem; }
    .tables-list { max-height: 400px; overflow-y: auto; margin-top: 0.5rem; }
    .table-item { display: flex; justify-content: space-between; padding: 0.5rem; border-radius: 4px; cursor: pointer; }
    .table-item:hover { background: #f0f0f0; }
    .table-item.active { background: #e3f2fd; }
    .table-name { color: var(--color-secondary); font-size: 14px; }
    .table-name.active { color: var(--color-primary); font-weight: 600; }
    .table-count { color: var(--color-text-subtle); font-size: 12px; }
    .search-input { width: 100%; padding: 0.5rem; border: 1px solid var(--color-border-strong); border-radius: 4px; margin-bottom: 1rem; }
    .empty-state { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--color-text-subtle); }
    .error-message { color: var(--color-accent); margin-bottom: 1rem; }
    .required-yes { color: var(--color-accent); }
    .required-no { color: var(--color-text-subtle); }
</style>
{% endblock %}

{% block content %}
<div class="card" x-data="schemaPage()">
    <h1>Schema Explorer</h1>
    <input type="text" class="search-input" x-model="searchQuery" placeholder="Search tables..." @input="updateFilteredTables()">

    <div class="explorer-layout">
        <!-- Tables List -->
        <section class="tables-panel" aria-label="Tables list">
            <div class="tables-panel-title">Tables (<span x-text="tables?.count ?? 0"></span>)</div>
            <div class="tables-list">
                <template x-for="table in filteredTables" :key="table.name">
                    <div :class="['table-item', { active: selectedTable === table.name }]"
                         @click="selectTable(table.name)">
                        <span :class="['table-name', { active: selectedTable === table.name }]"
                              x-text="table.name"></span>
                        <span class="table-count" x-text="table.record_count"></span>
                    </div>
                </template>
            </div>
        </section>

        <!-- Table Details -->
        <section>
            <div x-show="!selectedTable" class="empty-state card">
                <span>Select a table to view its schema</span>
            </div>

            <article x-show="selectedTable && tableSchema" class="card">
                <h2 x-text="tableSchema?.table?.name"></h2>
                <table>
                    <thead>
                        <tr>
                            <th scope="col">Column</th>
                            <th scope="col">Type</th>
                            <th scope="col">Size</th>
                            <th scope="col">Required</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="field in (tableSchema?.table?.fields ?? [])" :key="field.name">
                            <tr>
                                <td x-text="field.name"></td>
                                <td x-text="field.type"></td>
                                <td x-text="field.size"></td>
                                <td>
                                    <span :class="field.required ? 'required-yes' : 'required-no'"
                                          x-text="field.required ? 'Required' : 'Optional'"></span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </article>

            <div x-show="tableSchema?.error" class="error-message" x-text="tableSchema.error"></div>
        </section>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/dist/assets/schema.js"></script>
<script src="/dist/assets/apiClient.js"></script>
<script>
    function schemaPage() {
        return {
            tables: null,
            selectedTable: null,
            tableSchema: null,
            searchQuery: '',
            filteredTables: [],

            async init() {
                try {
                    this.tables = await loadTables()
                    this.updateFilteredTables()
                } catch (e) {
                    // 401 redirects to /login
                }
            },

            async selectTable(name) {
                this.selectedTable = name
                try {
                    this.tableSchema = await loadTableSchema(name)
                } catch (e) {
                    this.tableSchema = { error: e.message }
                }
            },

            updateFilteredTables() {
                this.filteredTables = filterTables(this.tables?.tables ?? [], this.searchQuery)
            }
        }
    }
</script>
{% endblock %}
