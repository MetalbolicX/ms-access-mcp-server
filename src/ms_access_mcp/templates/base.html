<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title | default("MS Access MCP") }}</title>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        :root {
            --color-primary: #3498db;
            --color-primary-hover: #2980b9;
            --color-secondary: #2c3e50;
            --color-accent: #e74c3c;
            --color-background: #f5f5f5;
            --color-surface: white;
            --color-text-muted: #555;
            --color-text-faint: #777;
            --color-text-subtle: #999;
            --color-border: #eee;
            --color-border-strong: #ddd;
            --color-surface-alt: #f8f9fa;
            --color-surface-hover: #e9ecef;
            --color-warning: #f39c12;
            --color-success: #27ae60;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--color-background); }
        .site-header { background: var(--color-secondary); padding: 1rem; }
        .site-header .site-nav a { color: white; text-decoration: none; margin-right: 1rem; }
        .site-header .site-nav a:hover { text-decoration: underline; }
        .page-main { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: var(--color-secondary); margin-bottom: 1rem; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<header class="site-header">
    <nav class="site-nav" aria-label="Primary">
        <a href="/dashboard">Dashboard</a>
        <a href="/schema">Schema</a>
        <a href="/er-diagram">ER Diagram</a>
        <a href="/jobs">Jobs</a>
        <a href="/api/logout">Logout</a>
    </nav>
</header>
<main class="page-main">
    {% block content %}{% endblock %}
</main>
{% block scripts %}{% endblock %}
</body>
</html>
