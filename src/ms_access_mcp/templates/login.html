{% extends "base.html" %}

{% block extra_head %}
<link rel="stylesheet" href="/dist/assets/styles.css">
<style>
    .login-container { max-width: 400px; margin: 4rem auto; background: var(--color-surface); padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .login-container h1 { text-align: center; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--color-text-muted); }
    .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--color-border-strong); border-radius: 4px; font-size: 1rem; }
    .btn { width: 100%; padding: 0.75rem; background: var(--color-primary); color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    .btn:hover { background: var(--color-primary-hover); }
    .error-message { color: var(--color-accent); margin-bottom: 1rem; text-align: center; }
</style>
{% endblock %}

{% block content %}
<div class="login-container" x-data="loginPage()">
    <h1>MS Access MCP Login</h1>
    <div class="error-message" x-show="error" x-text="error"></div>
    <form novalidate @submit.prevent="handleLogin()">
        <div class="form-group">
            <label for="apiKey">API Key</label>
            <input type="password" id="apiKey" x-model="apiKey" placeholder="Enter your API key" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" :disabled="isLoading">
            <span x-show="!isLoading">Login</span>
            <span x-show="isLoading">Authenticating...</span>
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="/dist/assets/login.js"></script>
<script>
    // Alpine.js login page controller
    document.addEventListener('alpine:init', () => {
        Alpine.data('loginPage', () => ({
            apiKey: '',
            error: '',
            isLoading: false,
            async handleLogin() {
                this.error = ''
                if (!this.apiKey || !this.apiKey.trim()) {
                    this.error = 'Please enter your API key'
                    return
                }
                this.isLoading = true
                try {
                    this.error = await login(this.apiKey)
                } catch (e) {
                    this.error = 'Connection error'
                } finally {
                    this.isLoading = false
                }
            }
        }))
    })
</script>
{% endblock %}
